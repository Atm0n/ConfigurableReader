name: Build and Publish

on:
  push:
    branches: [ developer, master ]
  pull_request:
    branches: [ developer, master ]

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore ConfigurableReader.slnx

    - name: Build
      run: dotnet build ConfigurableReader.slnx --configuration Release --no-restore

    - name: Test
      run: dotnet test ConfigurableReader.slnx --configuration Release --no-build --verbosity normal
