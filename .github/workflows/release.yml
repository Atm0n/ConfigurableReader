name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags starting with 'v', e.g., v1.0.0

permissions:
  contents: write # Needed to create a GitHub Release

jobs:
  release:
    name: Build & Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            executable_name: ConfigurableReader-Windows-x64.exe
            source_path: ./publish/ConfigurableReader.exe
          - os: ubuntu-latest
            rid: linux-x64
            executable_name: ConfigurableReader-Linux-x64
            source_path: ./publish/ConfigurableReader
          - os: macos-latest
            rid: osx-x64
            executable_name: ConfigurableReader-macOS-x64
            source_path: ./publish/ConfigurableReader

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Publish
      run: dotnet publish ConfigurableReader/ConfigurableReader.csproj -c Release -r ${{ matrix.rid }} -p:PublishSingleFile=true -p:SelfContained=true -p:IncludeNativeLibrariesForSelfExtract=true -p:DebugType=None -o ./publish

    - name: Prepare Release Asset
      shell: bash
      run: cp ${{ matrix.source_path }} ./${{ matrix.executable_name }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        files: ${{ matrix.executable_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
