name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags starting with 'v', e.g., v1.0.0

permissions:
  contents: write # Needed to create a GitHub Release

jobs:
  release:
    name: Build & Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            archive_name: ConfigurableReader-Windows-x64.zip
          - os: ubuntu-latest
            rid: linux-x64
            archive_name: ConfigurableReader-Linux-x64.zip
          - os: macos-latest
            rid: osx-x64
            archive_name: ConfigurableReader-macOS-x64.zip

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Publish
      run: dotnet publish ConfigurableReader/ConfigurableReader.csproj -c Release -r ${{ matrix.rid }} -o ./publish

    - name: Zip Output (Windows)
      if: matrix.os == 'windows-latest'
      run: Compress-Archive -Path ./publish/* -DestinationPath ./${{ matrix.archive_name }}

    - name: Zip Output (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        cd publish
        zip -r ../${{ matrix.archive_name }} ./*

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.archive_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
